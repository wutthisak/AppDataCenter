services:
  db:
    image: ${MARIADB_IMAGE:-mariadb:11.4}
    container_name: app-data-center-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-app_data_center}
      MARIADB_USER: ${MARIADB_USER:-app_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?set MARIADB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?set MARIADB_ROOT_PASSWORD in .env}
      TZ: ${TZ:-Asia/Bangkok}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE:-wutthisak/app-data-center:latest}
    container_name: app-data-center-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      APP_URL: ${APP_URL:-http://localhost:3000}
      SERVER_ACTION_ALLOWED_ORIGINS: ${SERVER_ACTION_ALLOWED_ORIGINS:-localhost:3000,127.0.0.1:3000}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      TOTP_ISSUER: ${TOTP_ISSUER:-App Data Center}
      TZ: ${TZ:-Asia/Bangkok}
    ports:
      - "${APP_PORT:-3000}:3000"
    command: npm run start

volumes:
  db_data:
